<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Wanderlist</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>

<div class="auth-page">
  <!-- Left Panel -->
  <div class="auth-panel-left">
    <img
      class="auth-bg-image"
      src="https://images.unsplash.com/photo-1503220317375-aaad61436b1b?w=1200&q=80&auto=format"
      alt="Travel"
    />
    <div class="auth-bg-overlay"></div>
    <div class="auth-panel-content animate-fade-up">
      <p class="auth-quote">"The world is a book, and those who do not travel read only one page."</p>
      <p class="auth-quote-attr">— Saint Augustine</p>
      <div class="auth-destinations-preview">
        <span class="auth-dest-chip">🗼 Paris</span>
        <span class="auth-dest-chip">🗻 Kyoto</span>
        <span class="auth-dest-chip">🏖️ Bali</span>
        <span class="auth-dest-chip">🏔️ Patagonia</span>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-panel-right">
    <div class="auth-form-container animate-fade-up">
      <a href="index.html" class="auth-logo">
        <div class="auth-logo-mark">✈</div>
        <span class="auth-logo-text">Wander<span>list</span></span>
      </a>

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading">Sign in to continue your journey.</p>

      <div class="auth-error-banner" id="login-error" style="display:none">
        <span>⚠</span>
        <span>Invalid credentials</span>
      </div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Your password"
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" id="toggle-password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;margin-top:4px">
          Sign In
        </button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>initLoginPage();</script>
</body>
</html>
