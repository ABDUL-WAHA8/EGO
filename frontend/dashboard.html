<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bucket List — Wanderlist</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages/dashboard.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <div class="navbar-logo-mark">✈</div>
      <span class="navbar-logo-text">Wander<span>list</span></span>
    </a>
    <nav class="navbar-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="explore.html" class="nav-link">Explore</a>
      <a href="dashboard.html" class="nav-link active">My List</a>
    </nav>
    <div class="navbar-right" data-auth-area></div>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="navbar-mobile-menu" id="mobile-menu">
  <a href="index.html" class="nav-link">Home</a>
  <a href="explore.html" class="nav-link">Explore</a>
  <a href="dashboard.html" class="nav-link active">My List</a>
</div>

<!-- PAGE -->
<main class="page-content">
  <div class="container">

    <!-- Header -->
    <div class="dash-header animate-fade-up">
      <div>
        <div class="dash-greeting" id="dash-greeting">Good morning</div>
        <h1 class="dash-title" id="dash-username">My Bucket List</h1>
      </div>
      <button class="btn btn-primary btn-lg" id="add-dest-btn">
        + Add Destination
      </button>
    </div>

    <!-- Stats -->
    <div class="dash-stats animate-fade-up" style="animation-delay:0.1s">
      <div class="stat-card">
        <div class="stat-label">Total Destinations</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-icon">🗺️</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Visited</div>
        <div class="stat-value" id="stat-visited">—</div>
        <div class="stat-icon">✅</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wishlist</div>
        <div class="stat-value" id="stat-wishlist">—</div>
        <div class="stat-icon">✨</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Countries</div>
        <div class="stat-value" id="stat-countries">—</div>
        <div class="stat-icon">🌍</div>
      </div>
    </div>

    <!-- Filters & Search -->
    <div class="filter-bar animate-fade-up" style="animation-delay:0.15s">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="wishlist">Wishlist</button>
      <button class="filter-btn" data-filter="visited">Visited</button>
      <div class="filter-spacer"></div>
      <div class="search-bar" style="width:260px">
        <span class="search-icon">🔍</span>
        <input type="text" id="dest-search" placeholder="Search destinations..." />
      </div>
    </div>

    <!-- Grid -->
    <div class="dest-grid animate-fade-up" id="dest-grid" style="animation-delay:0.2s">
      <!-- Populated by JS -->
    </div>

  </div>
</main>

<!-- ─── ADD/EDIT MODAL ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="dest-modal" style="display:none">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add Destination</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <form id="dest-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="place_name">Place Name *</label>
            <input type="text" id="place_name" class="form-input" placeholder="e.g. Machu Picchu" />
          </div>
          <div class="form-group">
            <label class="form-label" for="country">Country *</label>
            <input type="text" id="country" class="form-input" placeholder="e.g. Peru" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="city">City / Region</label>
          <input type="text" id="city" class="form-input" placeholder="e.g. Cusco Region" />
        </div>
        <div class="form-group">
          <label class="form-label" for="description">Description</label>
          <textarea id="description" class="form-textarea" placeholder="What makes this place special?" style="height:80px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="notes">Personal Notes</label>
          <textarea id="notes" class="form-textarea" placeholder="Tips, reminders, bucket list dreams..." style="height:80px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="image_url">Image URL</label>
          <input type="url" id="image_url" class="form-input" placeholder="https://images.unsplash.com/..." />
        </div>
        <div style="display:flex;gap:var(--space-6)">
          <label class="checkbox-group">
            <input type="checkbox" id="is_visited" />
            <span style="font-size:14px">Mark as visited</span>
          </label>
          <label class="checkbox-group">
            <input type="checkbox" id="is_public" checked />
            <span style="font-size:14px">Share publicly</span>
          </label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('dest-modal')">Cancel</button>
      <button class="btn btn-primary" id="dest-submit-btn" type="button" onclick="document.getElementById('dest-form').dispatchEvent(new Event('submit'))">
        Add to Bucket List
      </button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/dashboard.js"></script>
<script>
  initNavbar();
  initDashboard();
</script>
</body>
</html>
