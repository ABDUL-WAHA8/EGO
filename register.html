<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Wanderlist</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 70% 80%,rgba(201,169,110,.06),transparent 60%)}
    .auth-card{background:var(--bg-card);border:1px solid var(--border-s);border-radius:var(--r-xl);padding:40px;width:100%;max-width:440px;box-shadow:var(--sh-lg)}
    .auth-logo{text-align:center;margin-bottom:28px}
    .auth-logo-mark{width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
    .auth-logo h1{font-size:1.8rem}.auth-logo h1 span{color:var(--accent)}
    .auth-logo p{color:var(--text-2);font-size:14px;margin-top:4px}
    .auth-footer{text-align:center;margin-top:20px;font-size:14px;color:var(--text-2)}
    .auth-footer a{color:var(--accent)}
    .pwd-wrap{position:relative}
    .pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-2);cursor:pointer;font-size:16px;padding:0}
    .hint{font-size:12px;color:var(--text-m);margin-top:3px}
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card anim-up">
    <div class="auth-logo">
      <div class="auth-logo-mark">✈</div>
      <h1>Wander<span>list</span></h1>
      <p>Create your free account</p>
    </div>

    <div class="error-banner" id="register-err"><span>✕</span><span></span></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="email" type="email" class="form-input" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="username" class="form-input" placeholder="e.g. wanderer42">
        <span class="hint">3–30 characters. Letters and numbers only.</span>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pwd-wrap">
          <input id="password" type="password" class="form-input" placeholder="Min 8 characters">
          <button type="button" class="pwd-toggle" id="toggle-pwd">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input id="confirm-password" type="password" class="form-input" placeholder="Repeat your password">
      </div>
      <button type="submit" class="btn-accent" id="register-btn" style="width:100%;justify-content:center;margin-top:8px">Create Account — It's Free</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>initRegisterPage();</script>
</body>
</html>
